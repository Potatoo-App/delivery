<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Potatoo — الدليفري القريبين</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold-1:#FFCC44; --gold-2:#E08A00;
      --bg:#0E0E0E; --card:#1A1A1A; --item:#222222; --border:#2E2E2E;
      --text:#FFFFFF; --sub:rgba(255,255,255,0.5);
      --gold-grad:linear-gradient(180deg,#FFCC44,#E08A00);
      --red:#FF3B30; --green:#30D158; --orange:#FF9500; --blue:#0A84FF;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;}

    /* TOPBAR */
    #topbar{
      position:sticky;top:0;z-index:50;
      background:rgba(14,14,14,0.95);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      padding:0 20px;height:60px;display:flex;align-items:center;gap:12px;
    }
    .logo-sm{width:36px;height:36px;border-radius:10px;background:var(--gold-grad);
      display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
    .topbar-title{font-size:18px;font-weight:900;flex:1;
      background:var(--gold-grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .back-btn{padding:6px 14px;border-radius:10px;border:1px solid var(--border);
      background:transparent;color:var(--sub);font-family:'Cairo',sans-serif;
      font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;
      display:flex;align-items:center;}
    .back-btn:hover{border-color:var(--gold-1);color:var(--gold-1);}

    /* CONTENT */
    .content{padding:24px 20px 100px;max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:16px;}

    /* CONTROLS CARD */
    .controls-card{
      background:var(--card);border:1px solid var(--border);border-radius:24px;padding:20px;
    }
    .controls-title{font-size:13px;font-weight:900;color:var(--sub);margin-bottom:14px;}
    .controls-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}

    .field-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:160px;}
    .field-group label{font-size:12px;font-weight:700;color:var(--sub);}
    .field-group select{
      padding:10px 14px;border-radius:12px;border:1px solid var(--border);
      background:var(--item);color:var(--text);
      font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
      width:100%;
    }
    .field-group select:focus{outline:none;border-color:var(--gold-1);}

    .radius-group{display:flex;flex-direction:column;gap:6px;min-width:120px;}
    .radius-group label{font-size:12px;font-weight:700;color:var(--sub);}
    .radius-row{display:flex;gap:6px;}
    .radius-btn{
      flex:1;height:38px;border-radius:10px;border:1px solid var(--border);
      background:var(--item);color:var(--sub);
      font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
      cursor:pointer;transition:all 0.2s;
    }
    .radius-btn.active{background:rgba(255,204,68,0.15);border-color:rgba(255,204,68,0.4);color:var(--gold-1);}

    .search-btn{
      height:42px;padding:0 24px;border-radius:14px;border:none;
      background:var(--gold-grad);color:#000;
      font-family:'Cairo',sans-serif;font-size:14px;font-weight:900;
      cursor:pointer;transition:opacity 0.2s,transform 0.15s;
      white-space:nowrap;flex-shrink:0;align-self:flex-end;
      display:flex;align-items:center;gap:8px;
    }
    .search-btn:hover{opacity:0.9;}
    .search-btn:active{transform:scale(0.97);}
    .search-btn:disabled{opacity:0.5;cursor:not-allowed;}

    /* NO BRANCH WARNING */
    .no-coords-warn{
      background:rgba(255,149,0,0.1);border:1px solid rgba(255,149,0,0.3);
      border-radius:14px;padding:12px 16px;
      font-size:13px;font-weight:700;color:var(--orange);
      display:none;
    }
    .no-coords-warn.show{display:block;}

    /* STATS ROW */
    .stats-row{display:flex;gap:10px;}
    .stat-pill{
      flex:1;background:var(--card);border:1px solid var(--border);border-radius:16px;
      padding:14px 16px;text-align:center;
    }
    .stat-pill-val{font-size:22px;font-weight:900;background:var(--gold-grad);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .stat-pill-label{font-size:11px;color:var(--sub);font-weight:700;margin-top:2px;}

    /* DRIVER CARD */
    .drivers-list{display:flex;flex-direction:column;gap:10px;}
    .driver-card{
      background:var(--card);border:1px solid var(--border);border-radius:20px;
      padding:16px 20px;display:flex;align-items:center;gap:16px;
      animation:cardIn 0.3s ease both;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

    .driver-rank{
      width:36px;height:36px;border-radius:12px;background:var(--gold-grad);
      display:flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:900;color:#000;flex-shrink:0;
    }
    .driver-rank.rank-1{background:var(--gold-grad);}
    .driver-rank.rank-2{background:linear-gradient(180deg,#C0C0C0,#808080);color:#fff;}
    .driver-rank.rank-3{background:linear-gradient(180deg,#CD7F32,#8B4513);color:#fff;}

    .driver-info{flex:1;min-width:0;}
    .driver-name{font-size:15px;font-weight:900;margin-bottom:4px;}
    .driver-phones{display:flex;flex-wrap:wrap;gap:6px;}
    .phone-chip{
      padding:3px 10px;border-radius:20px;
      background:rgba(255,204,68,0.1);border:1px solid rgba(255,204,68,0.2);
      color:var(--gold-1);font-size:12px;font-weight:700;direction:ltr;
    }
    .phone-chip a{color:inherit;text-decoration:none;}
    .phone-chip a:hover{text-decoration:underline;}

    .driver-distance{
      display:flex;flex-direction:column;align-items:center;flex-shrink:0;
    }
    .distance-val{font-size:18px;font-weight:900;color:var(--green);}
    .distance-val.far{color:var(--orange);}
    .distance-val.very-far{color:var(--red);}
    .distance-unit{font-size:11px;color:var(--sub);font-weight:700;}

    /* EMPTY */
    .empty-state{
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:48px 20px;gap:12px;text-align:center;
    }
    .empty-icon{font-size:52px;}
    .empty-title{font-size:17px;font-weight:900;}
    .empty-sub{font-size:13px;color:var(--sub);}

    /* LOADER */
    .loader-wrap{display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:48px;gap:14px;}
    .ld-spinner{width:36px;height:36px;border:3px solid var(--border);
      border-top-color:var(--gold-1);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .ld-text{font-size:13px;color:var(--sub);font-weight:700;}

    /* INITIAL STATE */
    .initial-state{
      display:flex;flex-direction:column;align-items:center;
      justify-content:center;padding:48px 20px;gap:12px;text-align:center;
    }
    .initial-icon{font-size:52px;}
    .initial-title{font-size:16px;font-weight:900;color:var(--sub);}
  </style>
</head>
<body>

<div id="topbar">
  <div class="logo-sm">🥔</div>
  <div class="topbar-title">الدليفري القريبين</div>
  <a class="back-btn" href="./index.html">← رجوع</a>
</div>

<div class="content">

  <!-- CONTROLS -->
  <div class="controls-card">
    <div class="controls-title">🔍 بحث عن دليفري قريب</div>
    <div class="controls-row">

      <div class="field-group">
        <label>الفرع</label>
        <select id="branch-select">
          <option value="">اختر الفرع...</option>
        </select>
      </div>

      <div class="radius-group">
        <label>نطاق البحث</label>
        <div class="radius-row">
          <button class="radius-btn active" data-r="5"  onclick="setRadius(this)">5 كم</button>
          <button class="radius-btn"        data-r="10" onclick="setRadius(this)">10 كم</button>
          <button class="radius-btn"        data-r="20" onclick="setRadius(this)">20 كم</button>
        </div>
      </div>

      <button class="search-btn" id="search-btn" onclick="doSearch()">
        <span id="search-btn-text">🛵 عرض</span>
      </button>

    </div>
  </div>

  <!-- NO COORDS WARNING -->
  <div class="no-coords-warn" id="no-coords-warn">
    ⚠️ الفرع المختار ليس له إحداثيات مسجلة — يرجى تحديث بيانات الفرع وإضافة رابط Google Maps
  </div>

  <!-- STATS -->
  <div class="stats-row" id="stats-row" style="display:none;">
    <div class="stat-pill">
      <div class="stat-pill-val" id="stat-count">0</div>
      <div class="stat-pill-label">دليفري متاح</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-val" id="stat-closest">—</div>
      <div class="stat-pill-label">الأقرب (كم)</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-val" id="stat-radius">—</div>
      <div class="stat-pill-label">نطاق البحث (كم)</div>
    </div>
  </div>

  <!-- RESULTS -->
  <div id="results-wrap">
    <div class="initial-state">
      <div class="initial-icon">🛵</div>
      <div class="initial-title">اختر الفرع واضغط عرض</div>
    </div>
  </div>

</div>

<script>
const API    = 'https://potatoo-eight.vercel.app/api'
const token  = localStorage.getItem('pt_token')
if (!token) window.location.replace('./login.html')

let selectedRadius = 5
let branches       = []

// ============================================================
// INIT
// ============================================================
async function init() {
  await loadBranches()
}

// ============================================================
// LOAD BRANCHES
// ============================================================
async function loadBranches() {
  try {
    const res  = await fetch(`${API}/restaurant/user-restaurants`, {
      headers: { Authorization: `Bearer ${token}` }
    })
    if (res.status === 401) { doLogout(); return }
    const json = await res.json()
    if (!json.success) return

    branches = json.data?.branches || []
    const sel = document.getElementById('branch-select')

    branches.forEach(b => {
      const opt = document.createElement('option')
      opt.value = b._id
      opt.textContent = b.arabicName || b.englishName
      sel.appendChild(opt)
    })

    // لو فرع واحد بس اختاره تلقائياً
    if (branches.length === 1) {
      sel.value = branches[0]._id
      checkBranchCoords(branches[0])
    }

  } catch(e) {
    console.error(e)
  }
}

// ============================================================
// CHECK COORDS
// ============================================================
function checkBranchCoords(branch) {
  const warn = document.getElementById('no-coords-warn')
  const coords = branch?.location?.coordinates
  const hasCoords = coords && (coords[0] !== 0 || coords[1] !== 0)
  warn.classList.toggle('show', !hasCoords)
}

document.getElementById('branch-select').addEventListener('change', function() {
  const branch = branches.find(b => b._id === this.value)
  if (branch) checkBranchCoords(branch)
  else document.getElementById('no-coords-warn').classList.remove('show')
})

// ============================================================
// SET RADIUS
// ============================================================
function setRadius(el) {
  selectedRadius = parseInt(el.dataset.r)
  document.querySelectorAll('.radius-btn').forEach(b => b.classList.remove('active'))
  el.classList.add('active')
}

// ============================================================
// SEARCH
// ============================================================
async function doSearch() {
  const branchId = document.getElementById('branch-select').value
  if (!branchId) {
    alert('اختر الفرع أولاً')
    return
  }

  const branch = branches.find(b => b._id === branchId)
  if (!branch) return

  // استخراج الإحداثيات من location.coordinates [lng, lat]
  const coords = branch?.location?.coordinates
  if (!coords || (coords[0] === 0 && coords[1] === 0)) {
    document.getElementById('no-coords-warn').classList.add('show')
    return
  }

  const lng = coords[0]
  const lat = coords[1]

  // loading
  const btn     = document.getElementById('search-btn')
  const btnText = document.getElementById('search-btn-text')
  btn.disabled  = true
  btnText.innerHTML = '<div style="width:16px;height:16px;border:2px solid rgba(0,0,0,0.3);border-top-color:#000;border-radius:50%;animation:spin 0.6s linear infinite;"></div>'

  document.getElementById('stats-row').style.display = 'none'
  document.getElementById('results-wrap').innerHTML = `
    <div class="loader-wrap">
      <div class="ld-spinner"></div>
      <div class="ld-text">جاري البحث عن الدليفري القريبين...</div>
    </div>`

  try {
    const res  = await fetch(
      `${API}/delivery/nearby?lat=${lat}&lng=${lng}&radius=${selectedRadius}`,
      { headers: { Authorization: `Bearer ${token}` } }
    )
    if (res.status === 401) { doLogout(); return }
    const json = await res.json()

    if (!json.success) {
      document.getElementById('results-wrap').innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <div class="empty-title">فشل التحميل</div>
          <div class="empty-sub">${json.message}</div>
        </div>`
      return
    }

    renderResults(json.data, lat, lng)

  } catch(e) {
    document.getElementById('results-wrap').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-title">تعذر الاتصال بالسيرفر</div>
        <div class="empty-sub">تحقق من اتصالك وحاول مرة أخرى</div>
      </div>`
  } finally {
    btn.disabled = false
    btnText.innerHTML = '🛵 عرض'
  }
}

// ============================================================
// RENDER RESULTS
// ============================================================
function renderResults(drivers, branchLat, branchLng) {
  // stats
  const statsRow = document.getElementById('stats-row')
  statsRow.style.display = 'flex'
  document.getElementById('stat-count').textContent   = drivers.length
  document.getElementById('stat-closest').textContent = drivers.length ? drivers[0].distance : '—'
  document.getElementById('stat-radius').textContent  = selectedRadius

  if (!drivers.length) {
    document.getElementById('results-wrap').innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🛵</div>
        <div class="empty-title">لا يوجد دليفري متاح في النطاق المحدد</div>
        <div class="empty-sub">جرب توسيع نطاق البحث</div>
      </div>`
    return
  }

  const html = drivers.map((d, i) => {
    const rank = i + 1
    const rankClass = rank <= 3 ? `rank-${rank}` : ''
    const rankLabel = rank <= 3 ? ['🥇','🥈','🥉'][rank-1] : rank

    const distClass = d.distance <= 3 ? '' : d.distance <= 7 ? 'far' : 'very-far'

    const phonesHtml = (d.phones || []).map(p =>
      `<span class="phone-chip"><a href="tel:${p}">${p}</a></span>`
    ).join('')

    return `
      <div class="driver-card" style="animation-delay:${i * 0.05}s">
        <div class="driver-rank ${rankClass}">${rankLabel}</div>
        <div class="driver-info">
          <div class="driver-name">🛵 ${d.name}</div>
          <div class="driver-phones">${phonesHtml || '<span style="color:var(--sub);font-size:12px;">لا يوجد رقم</span>'}</div>
        </div>
        <div class="driver-distance">
          <div class="distance-val ${distClass}">${d.distance}</div>
          <div class="distance-unit">كيلومتر</div>
        </div>
      </div>`
  }).join('')

  document.getElementById('results-wrap').innerHTML = `<div class="drivers-list">${html}</div>`
}

// ============================================================
// LOGOUT
// ============================================================
function doLogout() {
  localStorage.removeItem('pt_token')
  localStorage.removeItem('pt_user')
  window.location.replace('./login.html')
}

// ============================================================
// INIT
// ============================================================
init()
</script>
</body>
</html>
