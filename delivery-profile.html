<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Potatoo Delivery — بياناتك</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold-1:#FFCC44; --gold-2:#E08A00;
      --bg:#0E0E0E; --card:#1A1A1A; --item:#222222; --border:#2E2E2E;
      --text:#FFFFFF; --sub:rgba(255,255,255,0.5);
      --gold-grad:linear-gradient(180deg,#FFCC44,#E08A00);
      --red:#FF3B30; --green:#30D158;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    body::before{content:'';position:fixed;inset:0;z-index:0;
      background-image:radial-gradient(circle at 20% 20%,rgba(255,204,68,0.07) 0%,transparent 50%),
                       radial-gradient(circle at 80% 80%,rgba(224,138,0,0.07) 0%,transparent 50%);
      pointer-events:none;}
    .card{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);
      border-radius:28px;padding:40px 32px;width:100%;max-width:460px;
      box-shadow:0 24px 80px rgba(0,0,0,0.6);}
    .logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;}
    .logo-box{width:64px;height:64px;border-radius:18px;background:var(--gold-grad);
      display:flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:12px;
      box-shadow:0 8px 24px rgba(224,138,0,0.4);}
    .logo-title{font-size:20px;font-weight:900;background:var(--gold-grad);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .logo-sub{font-size:13px;color:var(--sub);margin-top:4px;font-weight:700;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:13px;font-weight:700;color:var(--sub);margin-bottom:6px;}
    .field input{width:100%;padding:13px 16px;background:#111;border:1.5px solid var(--border);
      border-radius:14px;color:var(--text);font-family:'Cairo',sans-serif;font-size:15px;
      outline:none;transition:border-color 0.2s;}
    .field input:focus{border-color:var(--gold-1);}
    .field input::placeholder{color:rgba(255,255,255,0.2);}
    .field input[dir="ltr"]{text-align:left;}
    .phones-wrap{display:flex;flex-direction:column;gap:8px;}
    .phone-row{display:flex;gap:8px;align-items:center;}
    .phone-row input{flex:1;}
    .remove-phone{width:36px;height:36px;border-radius:10px;border:1px solid rgba(255,59,48,0.3);
      background:rgba(255,59,48,0.1);color:var(--red);font-size:18px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .add-phone-btn{padding:8px 16px;border-radius:10px;border:1px solid rgba(255,204,68,0.3);
      background:rgba(255,204,68,0.1);color:var(--gold-1);font-family:'Cairo',sans-serif;
      font-size:13px;font-weight:700;cursor:pointer;margin-top:6px;width:100%;}
    .err{background:rgba(255,59,48,0.1);border:1px solid rgba(255,59,48,0.3);
      border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;color:var(--red);
      margin-bottom:14px;display:none;text-align:center;}
    .err.show{display:block;}
    .success-box{background:rgba(48,209,88,0.1);border:1px solid rgba(48,209,88,0.3);
      border-radius:12px;padding:10px 14px;font-size:13px;font-weight:700;color:var(--green);
      margin-bottom:14px;display:none;text-align:center;}
    .success-box.show{display:block;}
    .submit-btn{width:100%;height:52px;border-radius:16px;border:none;
      background:var(--gold-grad);color:#000;font-family:'Cairo',sans-serif;
      font-size:17px;font-weight:900;cursor:pointer;display:flex;align-items:center;
      justify-content:center;gap:8px;box-shadow:0 6px 24px rgba(224,138,0,0.35);
      transition:opacity 0.2s,transform 0.15s;margin-top:8px;}
    .submit-btn:hover{opacity:0.92;}
    .submit-btn:active{transform:scale(0.98);}
    .submit-btn:disabled{opacity:0.5;cursor:not-allowed;}
    .spinner{width:20px;height:20px;border:3px solid rgba(0,0,0,0.2);border-top-color:#000;
      border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .availability-row{display:flex;align-items:center;justify-content:space-between;
      background:var(--item);border-radius:16px;padding:14px 18px;margin-bottom:16px;}
    .availability-label{font-size:14px;font-weight:700;}
    .availability-sub{font-size:12px;color:var(--sub);margin-top:2px;}
    .toggle{position:relative;width:52px;height:28px;flex-shrink:0;}
    .toggle input{opacity:0;width:0;height:0;}
    .toggle-slider{position:absolute;inset:0;background:#333;border-radius:20px;
      cursor:pointer;transition:0.3s;}
    .toggle-slider:before{content:'';position:absolute;width:22px;height:22px;
      left:3px;top:3px;background:#fff;border-radius:50%;transition:0.3s;}
    .toggle input:checked + .toggle-slider{background:var(--green);}
    .toggle input:checked + .toggle-slider:before{transform:translateX(24px);}
    .section-divider{height:1px;background:var(--border);margin:20px 0;}
    .logout-btn{
      position:fixed; top:16px; left:16px; z-index:100;
      padding:8px 16px; border-radius:10px;
      border:1px solid rgba(255,59,48,0.3);
      background:rgba(255,59,48,0.1); color:var(--red);
      font-family:'Cairo',sans-serif; font-size:13px; font-weight:700;
      cursor:pointer; transition:all 0.2s;
    }
    .logout-btn:hover{background:rgba(255,59,48,0.25);}
  </style>
</head>
<body>

<button class="logout-btn" onclick="doLogout()">خروج</button>

<div class="card">
  <div class="logo-wrap">
    <div class="logo-box">🛵</div>
    <div class="logo-title">Potatoo Delivery</div>
    <div class="logo-sub">أكمل بياناتك للبدء</div>
  </div>

  <div class="err" id="err-msg"></div>
  <div class="success-box" id="success-msg"></div>

  <div class="field">
    <label>الاسم بالكامل</label>
    <input id="inp-name" type="text" placeholder="اسمك هنا"/>
  </div>

  <div class="field">
    <label>أرقام التليفون</label>
    <div class="phones-wrap" id="phones-wrap">
      <div class="phone-row">
        <input type="tel" dir="ltr" placeholder="01xxxxxxxxx" class="phone-input"/>
      </div>
    </div>
    <button class="add-phone-btn" onclick="addPhoneField()">+ إضافة رقم تاني</button>
  </div>

  <div class="field">
    <label>رابط الموقع (Google Maps)</label>
    <input id="inp-location" type="url" dir="ltr" placeholder="https://maps.google.com/..."/>
  </div>

  <div class="section-divider"></div>

  <div class="availability-row">
    <div>
      <div class="availability-label">الحالة</div>
      <div class="availability-sub" id="avail-sub">غير متاح حالياً</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="avail-toggle" onchange="updateAvailSub()"/>
      <span class="toggle-slider"></span>
    </label>
  </div>

  <button class="submit-btn" id="save-btn" onclick="saveProfile()">
    <span id="save-btn-text">حفظ البيانات</span>
  </button>
</div>

<script>
const API   = 'https://potatoo-eight.vercel.app/api/delivery'
const token = localStorage.getItem('delivery_token')
if (!token) window.location.replace('./index.html')

function showErr(msg) {
  const el = document.getElementById('err-msg')
  el.textContent = msg; el.classList.add('show')
  document.getElementById('success-msg').classList.remove('show')
}
function showSuccess(msg) {
  const el = document.getElementById('success-msg')
  el.textContent = msg; el.classList.add('show')
  document.getElementById('err-msg').classList.remove('show')
}
function setLoading(loading) {
  const btn = document.getElementById('save-btn')
  const txt = document.getElementById('save-btn-text')
  btn.disabled = loading
  txt.innerHTML = loading ? '<div class="spinner"></div>' : 'حفظ البيانات'
}

function updateAvailSub() {
  const checked = document.getElementById('avail-toggle').checked
  document.getElementById('avail-sub').textContent = checked ? 'متاح الآن ✅' : 'غير متاح حالياً'
}

function addPhoneField() {
  const wrap = document.getElementById('phones-wrap')
  const row  = document.createElement('div')
  row.className = 'phone-row'
  row.innerHTML = `
    <input type="tel" dir="ltr" placeholder="01xxxxxxxxx" class="phone-input"/>
    <button class="remove-phone" onclick="this.parentElement.remove()">×</button>`
  wrap.appendChild(row)
}

function doLogout() {
  localStorage.removeItem('delivery_token')
  localStorage.removeItem('delivery_user')
  window.location.replace('./index.html')
}

async function saveProfile() {
  document.getElementById('err-msg').classList.remove('show')
  document.getElementById('success-msg').classList.remove('show')

  const name         = document.getElementById('inp-name').value.trim()
  const locationLink = document.getElementById('inp-location').value.trim()
  const isAvailable  = document.getElementById('avail-toggle').checked

  const phones = [...document.querySelectorAll('.phone-input')]
    .map(i => i.value.trim()).filter(Boolean)

  if (!name)          { showErr('الاسم مطلوب'); return }
  if (!phones.length) { showErr('رقم تليفون واحد على الأقل مطلوب'); return }
  if (!locationLink)  { showErr('رابط الموقع مطلوب'); return }

  setLoading(true)
  try {
    const res  = await fetch(`${API}/complete-profile`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
      body: JSON.stringify({ name, phones, locationLink })
    })
    const json = await res.json()
    if (!json.success) { showErr(json.message); return }

    if (isAvailable) {
      await fetch(`${API}/toggle-availability`, {
        method: 'PATCH',
        headers: { Authorization: `Bearer ${token}` }
      })
    }

    // حدّث الـ localStorage
    const user = JSON.parse(localStorage.getItem('delivery_user') || '{}')
    localStorage.setItem('delivery_user', JSON.stringify({
      ...user,
      isProfileComplete: true,
      isAvailable
    }))

    showSuccess('تم حفظ البيانات بنجاح! جاري التحويل...')
    setTimeout(() => window.location.replace('./delivery-home.html'), 1500)
  } catch(e) {
    showErr('تعذر الاتصال بالسيرفر')
  } finally {
    setLoading(false)
  }
}
</script>
</body>
</html>
